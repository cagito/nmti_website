<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">지중경사계 데이터 해석 그래프 예시</title>
  <desc id="desc">깊이별 수평변위 곡선, 시간-누적변위 추세, 변위속도 및 연계 센서 분석 흐름을 나타내는 도식</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F7FA"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#071A2F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="58" y="72" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="31" font-weight="900">지중경사계 데이터 해석 핵심 화면</text>
  <text x="58" y="110" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="17" font-weight="650">깊이별 변위 위치, 시간별 진행성, 지하수위·강우·굴착 단계와의 상관관계를 함께 확인합니다.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="150" width="330" height="492" rx="22" fill="#FFFFFF"/>
    <text x="86" y="194" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="900">깊이별 수평변위</text>
    <text x="86" y="222" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="650">활동면·변곡점 추정</text>
    <line x1="112" y1="574" x2="338" y2="574" stroke="#DCE6EF" stroke-width="2"/>
    <line x1="112" y1="260" x2="112" y2="574" stroke="#DCE6EF" stroke-width="2"/>
    <g stroke="#E5EDF3" stroke-width="1">
      <line x1="112" y1="510" x2="338" y2="510"/>
      <line x1="112" y1="446" x2="338" y2="446"/>
      <line x1="112" y1="382" x2="338" y2="382"/>
      <line x1="112" y1="318" x2="338" y2="318"/>
      <line x1="160" y1="260" x2="160" y2="574"/>
      <line x1="208" y1="260" x2="208" y2="574"/>
      <line x1="256" y1="260" x2="256" y2="574"/>
      <line x1="304" y1="260" x2="304" y2="574"/>
    </g>
    <path d="M134 268 C150 315 180 340 208 374 C236 408 236 458 270 498 C290 522 304 548 326 568" fill="none" stroke="#247C8A" stroke-width="5" stroke-linecap="round"/>
    <circle cx="236" cy="458" r="9" fill="#78CBD6" stroke="#247C8A" stroke-width="3"/>
    <path d="M236 458 L330 430" stroke="#247C8A" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="228" y="420" fill="#247C8A" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="900">변위 집중 심도</text>
    <text x="80" y="266" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="12">0m</text>
    <text x="70" y="576" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="12">GL-30m</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="150" width="330" height="232" rx="22" fill="#FFFFFF"/>
    <text x="458" y="194" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="900">시간-누적변위 추세</text>
    <text x="458" y="222" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="650">굴착 단계별 증가 패턴</text>
    <line x1="468" y1="326" x2="726" y2="326" stroke="#DCE6EF" stroke-width="2"/>
    <line x1="468" y1="250" x2="468" y2="326" stroke="#DCE6EF" stroke-width="2"/>
    <path d="M470 314 L506 310 L542 302 L578 294 L614 278 L650 284 L686 262 L726 248" fill="none" stroke="#247C8A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M542 328 V250" stroke="#78CBD6" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M614 328 V250" stroke="#78CBD6" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M686 328 V250" stroke="#78CBD6" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="522" y="352" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="12" font-weight="750">굴착 1</text>
    <text x="594" y="352" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="12" font-weight="750">굴착 2</text>
    <text x="666" y="352" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="12" font-weight="750">굴착 3</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="410" width="330" height="232" rx="22" fill="#FFFFFF"/>
    <text x="458" y="454" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="900">판정 흐름</text>
    <g transform="translate(458 482)">
      <rect width="264" height="38" rx="10" fill="#F4F7FA" stroke="#DCE6EF"/>
      <text x="16" y="25" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="850">① 원자료 검토 · 초기치 확인</text>
      <path d="M132 40 V58" stroke="#247C8A" stroke-width="3" stroke-linecap="round"/>
      <rect y="60" width="264" height="38" rx="10" fill="#F4F7FA" stroke="#DCE6EF"/>
      <text x="16" y="85" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="850">② 변위량 · 변위속도 계산</text>
      <path d="M132 100 V118" stroke="#247C8A" stroke-width="3" stroke-linecap="round"/>
      <rect y="120" width="264" height="38" rx="10" fill="#071A2F"/>
      <text x="16" y="145" fill="#78CBD6" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="850">③ 관리기준 비교 · 조치 판단</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="802" y="150" width="340" height="492" rx="22" fill="#071A2F"/>
    <text x="832" y="194" fill="#FFFFFF" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="900">연계 센서 상관분석</text>
    <text x="832" y="222" fill="#D1DCE7" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="650">변위 원인을 단일 계측값으로 단정하지 않습니다.</text>
    <g transform="translate(832 262)">
      <circle cx="140" cy="142" r="54" fill="#247C8A"/>
      <text x="100" y="137" fill="#FFFFFF" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="900">지중경사계</text>
      <text x="112" y="160" fill="#DDF8FB" font-family="Pretendard, Arial, sans-serif" font-size="12" font-weight="750">수평변위</text>
      <g stroke="#78CBD6" stroke-width="3" stroke-linecap="round" opacity="0.9">
        <line x1="140" y1="88" x2="140" y2="30"/>
        <line x1="98" y1="110" x2="42" y2="74"/>
        <line x1="98" y1="174" x2="42" y2="220"/>
        <line x1="182" y1="110" x2="238" y2="74"/>
        <line x1="182" y1="174" x2="238" y2="220"/>
      </g>
      <g font-family="Pretendard, Arial, sans-serif" font-weight="850" font-size="13">
        <rect x="92" y="0" width="96" height="34" rx="17" fill="#F4F7FA"/><text x="112" y="22" fill="#071A2F">강우량계</text>
        <rect x="0" y="54" width="100" height="34" rx="17" fill="#F4F7FA"/><text x="18" y="76" fill="#071A2F">지하수위계</text>
        <rect x="0" y="214" width="100" height="34" rx="17" fill="#F4F7FA"/><text x="16" y="236" fill="#071A2F">간극수압계</text>
        <rect x="210" y="54" width="100" height="34" rx="17" fill="#F4F7FA"/><text x="230" y="76" fill="#071A2F">하중계</text>
        <rect x="210" y="214" width="100" height="34" rx="17" fill="#F4F7FA"/><text x="222" y="236" fill="#071A2F">지표침하계</text>
      </g>
    </g>
    <rect x="832" y="556" width="280" height="46" rx="14" fill="rgba(120,203,214,0.12)" stroke="#78CBD6" stroke-opacity="0.36"/>
    <text x="856" y="585" fill="#78CBD6" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="900">강우 → 수위 → 변위 변화 순서 검토</text>
  </g>
</svg>
