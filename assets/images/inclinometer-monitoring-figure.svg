    <circle cx="650" cy="326" r="7"/>
    <circle cx="712" cy="430" r="7"/>
    <circle cx="928" cy="324" r="7"/>
  </g>

  <g font-family="Pretendard, Arial, sans-serif" font-weight="900" font-size="16">
    <text x="562" y="225" fill="#78CBD6">① 현장 계측</text>
    <text x="653" y="368" fill="#78CBD6">② 수집·전송</text>
    <text x="846" y="452" fill="#78CBD6">③ 분석·알림</text>
  </g>
</svg>
