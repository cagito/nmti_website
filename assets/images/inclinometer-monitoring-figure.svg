    <rect x="332" y="232" width="34" height="338" rx="15" fill="#FFFFFF" stroke="#247C8A" stroke-width="5"/>
    <line x1="349" y1="250" x2="349" y2="548" stroke="#78CBD6" stroke-width="3" stroke-dasharray="8 8"/>
    <rect x="316" y="348" width="66" height="70" rx="18" fill="#247C8A"/>
    <circle cx="349" cy="371" r="9" fill="#78CBD6"/>
    <circle cx="349" cy="395" r="9" fill="#78CBD6"/>
    <text x="296" y="592" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">경사관·프로브</text>

    <path d="M366 246 C436 234 446 180 504 178" fill="none" stroke="#247C8A" stroke-width="5" stroke-linecap="round"/>
    <rect x="430" y="148" width="72" height="54" rx="12" fill="#071A2F"/>
    <circle cx="486" cy="175" r="6" fill="#78CBD6"/>
    <text x="405" y="132" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">케이블</text>

    <path d="M392 252 C420 306 415 406 392 484" fill="none" stroke="#247C8A" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 11"/>
    <text x="408" y="390" fill="#247C8A" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">수평변위 곡선</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="614" y="430" width="198" height="130" rx="20" fill="#FFFFFF"/>
    <text x="640" y="470" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="18" font-weight="900">데이터로거</text>
    <text x="640" y="500" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="650">전원 · 저장 · 통신</text>
    <rect x="640" y="520" width="122" height="10" rx="5" fill="#E3EBF2"/>
    <rect x="640" y="520" width="76" height="10" rx="5" fill="#247C8A"/>
  </g>

  <g fill="none" stroke="#78CBD6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M528 178 C586 205 612 268 650 326"/>
    <path d="M650 326 C687 384 694 402 712 430"/>
    <path d="M812 494 C900 470 930 394 928 324"/>
  </g>
  <g fill="#78CBD6">
