<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">지중경사계 설치 및 자동계측 시스템 구성도</title>
  <desc id="desc">흙막이 벽체 배면 지반에 설치된 경사관, 측정 프로브, 데이터로거, 서버 대시보드가 연결되는 흐름을 보여주는 기술 도식</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071A2F"/>
      <stop offset="1" stop-color="#103552"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F4F7FA" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#03111F" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <path d="M0 520 C180 470 260 560 430 504 C630 438 708 515 880 458 C1014 414 1110 410 1200 442 L1200 760 L0 760 Z" fill="#F4F7FA" opacity="0.96"/>
  <path d="M0 586 C210 532 360 632 560 560 C730 499 840 590 1200 512" fill="none" stroke="#78CBD6" stroke-width="2" opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="702" y="72" width="402" height="252" rx="22" fill="url(#panel)"/>
    <rect x="730" y="102" width="346" height="48" rx="10" fill="#071A2F"/>
    <text x="752" y="133" fill="#78CBD6" font-family="Pretendard, Arial, sans-serif" font-size="18" font-weight="800">NMTi 실시간 지중경사계 대시보드</text>
    <g transform="translate(734 176)">
      <rect width="152" height="104" rx="14" fill="#FFFFFF" stroke="#DCE6EF"/>
      <text x="18" y="33" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="800">누적변위</text>
      <text x="18" y="70" fill="#247C8A" font-family="Pretendard, Arial, sans-serif" font-size="32" font-weight="900">8.6 mm</text>
      <path d="M20 88 H132" stroke="#78CBD6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    </g>
    <g transform="translate(906 176)">
      <rect width="152" height="104" rx="14" fill="#FFFFFF" stroke="#DCE6EF"/>
      <text x="18" y="33" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="800">변위속도</text>
      <text x="18" y="70" fill="#247C8A" font-family="Pretendard, Arial, sans-serif" font-size="32" font-weight="900">0.3 mm/d</text>
      <path d="M20 88 L48 78 L74 82 L104 62 L132 56" fill="none" stroke="#247C8A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="94" y="114" width="434" height="504" rx="22" fill="url(#panel)"/>
    <text x="132" y="158" fill="#071A2F" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="900">흙막이 배면 지중경사계 설치 개념</text>
    <text x="132" y="190" fill="#526173" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="650">경사관 내부 깊이별 기울기 변화 → 수평변위 누적 산정</text>

    <rect x="140" y="238" width="86" height="326" fill="#D9E2EA"/>
    <g stroke="#071A2F" stroke-width="4">
      <line x1="152" y1="238" x2="152" y2="564"/>
      <line x1="214" y1="238" x2="214" y2="564"/>
      <line x1="152" y1="280" x2="214" y2="280"/>
      <line x1="152" y1="340" x2="214" y2="340"/>
      <line x1="152" y1="400" x2="214" y2="400"/>
